kind = "web"
previewPath = "/"
title = "RazziPT"
version = "1.0.0"
id = "razzipt-app"

[[services]]
localPort = 8000
name = "RazziPT"
paths = ["/"]

[services.development]
run = "cd /home/runner/workspace/artifacts/razzipt && PORT=8000 python main.py"

[services.production]

[services.production.run]
args = ["sh", "-c", "cd /home/runner/workspace/artifacts/razzipt && python main.py"]

[services.production.run.env]
PORT = "8000"
