<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - RazziPT</title>
    <script>
        // Early theme initialization - runs before page renders to prevent flash
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            let shouldBeDark = false;
            if (savedTheme === 'dark') {
                shouldBeDark = true;
            } else if (savedTheme === 'light') {
                shouldBeDark = false;
            } else if (prefersDark) {
                shouldBeDark = true;
            }
            
            if (shouldBeDark) {
                document.documentElement.classList.add('dark-mode');
                document.documentElement.style.colorScheme = 'dark';
            }
        })();
    </script>
    <style>
        /* CSS Variables for Theme */
        :root {
            --bg-primary: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #666;
            --border-color: #eee;
            --input-bg: #f8f9fa;
            --container-shadow: rgba(0, 0, 0, 0.3);
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-gradient: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            --success-gradient: linear-gradient(135deg, #00d084 0%, #00a86b 100%);
        }

        body.dark-mode {
            --bg-primary: #0f0f1e;
            --text-primary: #e4e4e7;
            --text-secondary: #a1a1a1;
            --border-color: #333;
            --input-bg: #1a1a2e;
            --container-shadow: rgba(0, 0, 0, 0.5);
            --primary-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --accent-gradient: linear-gradient(135deg, #0f3460 0%, #1a5c7a 100%);
            --success-gradient: linear-gradient(135deg, #2d4059 0%, #3d5a73 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--primary-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.4s ease, color 0.4s ease;
            color: var(--text-primary);
        }

        /* Theme Toggle Button */
        .theme-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 1000;
        }

        .toggle-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            cursor: pointer;
            font-size: 28px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .toggle-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.5);
        }

        .toggle-btn:active {
            transform: scale(0.95);
        }

        body.dark-mode .toggle-btn {
            background: rgba(100, 100, 100, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .container {
            background: var(--bg-primary);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px var(--container-shadow);
            max-width: 500px;
            width: 100%;
            transition: all 0.4s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        body.dark-mode .container {
            background: #111827;
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        }

        .logo-section {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .container-logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.15));
            transition: transform 0.3s ease;
        }

        .container-logo:hover {
            transform: scale(1.05);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2em;
            font-weight: 800;
            color: #5B3A9E;
            transition: all 0.4s ease;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-size: 0.95em;
        }

        body.dark-mode h1 {
            color: #00d4ff;
        }

        .slogan {
            font-size: 1.1em;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 12px auto 18px;
            letter-spacing: 0.5px;
            text-align: center;
            display: block;
        }

        body.dark-mode .slogan {
            -webkit-text-fill-color: #0099ff;
            background: none;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-weight: 500;
            transition: color 0.4s ease;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1em;
            background: var(--input-bg);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-gradient);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        body.dark-mode input:focus, 
        body.dark-mode select:focus {
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }
        
        .phone-group {
            display: flex;
            gap: 10px;
        }
        
        .phone-group select {
            flex: 0 0 130px;
        }
        
        .phone-group input {
            flex: 1;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .form-row input {
            width: 100%;
        }
        
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-weight: 500;
            transition: all 0.4s ease;
        }
        
        .message.error {
            background: rgba(255, 0, 0, 0.1);
            color: #ff6b6b;
            display: block;
            border: 1px solid rgba(255, 0, 0, 0.3);
        }
        
        .message.success {
            background: rgba(0, 200, 100, 0.1);
            color: #00d084;
            display: block;
            border: 1px solid rgba(0, 200, 100, 0.3);
        }
        
        .message.warning {
            background: rgba(255, 165, 0, 0.1);
            color: #ffa500;
            display: block;
            border: 1px solid rgba(255, 165, 0, 0.3);
        }
        
        .btn-signup {
            width: 100%;
            padding: 12px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-signup::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--accent-gradient);
            transition: left 0.3s ease;
            z-index: -1;
        }
        
        .btn-signup:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px var(--container-shadow);
        }

        .btn-signup:hover:not(:disabled)::before {
            left: 0;
        }
        
        .btn-signup:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .link-signin {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
            transition: color 0.4s ease;
        }
        
        .link-signin a {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        body.dark-mode .link-signin a {
            -webkit-text-fill-color: #0099ff;
            background: none;
        }
        
        .link-signin a:hover {
            opacity: 0.8;
        }
        
        .age-warning {
            color: #ffa500;
            font-size: 0.9em;
            display: none;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px;
            }

            .toggle-btn {
                width: 50px;
                height: 50px;
                font-size: 24px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Theme Toggle Button -->
    <div class="theme-toggle">
        <button class="toggle-btn" id="themeToggle" title="Toggle Light/Dark Mode">
            🌙
        </button>
    </div>

    <div class="container">
        <div class="logo-section">
            <img src="/static/logo.png" alt="RazziPT Logo" class="container-logo">
        </div>
        <h1>Create Your Account</h1>
        <p class="slogan">✨ A Woman Who's Always Right! ✨</p>
        <p class="subtitle">Join RazziPT and start chatting with personality</p>
        <div id="message" class="message"></div>
        
        <form id="signupForm">
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" required placeholder="Enter your full name">
            </div>
            
            <div class="form-group">
                <label for="email">Gmail/Email *</label>
                <input type="email" id="email" required placeholder="your.email@gmail.com">
            </div>
            
            <div class="form-group">
                <label for="phone">Phone Number *</label>
                <div class="phone-group">
                    <select id="country" required>
                        <option value="">Country Code</option>
                        <option value="+1">🇺🇸 +1 (USA/Canada)</option>
                        <option value="+44">🇬🇧 +44 (UK)</option>
                        <option value="+91">🇮🇳 +91 (India)</option>
                        <option value="+92">🇵🇰 +92 (Pakistan)</option>
                        <option value="+234">🇳🇬 +234 (Nigeria)</option>
                        <option value="+55">🇧🇷 +55 (Brazil)</option>
                        <option value="+86">🇨🇳 +86 (China)</option>
                        <option value="+81">🇯🇵 +81 (Japan)</option>
                        <option value="+82">🇰🇷 +82 (South Korea)</option>
                        <option value="+33">🇫🇷 +33 (France)</option>
                        <option value="+49">🇩🇪 +49 (Germany)</option>
                        <option value="+39">🇮🇹 +39 (Italy)</option>
                        <option value="+34">🇪🇸 +34 (Spain)</option>
                        <option value="+61">🇦🇺 +61 (Australia)</option>
                        <option value="+27">🇿🇦 +27 (South Africa)</option>
                        <option value="+1-876">🇯🇲 +1-876 (Jamaica)</option>
                        <option value="+1-246">🇧🇧 +1-246 (Barbados)</option>
                        <option value="+1-868">🇹🇹 +1-868 (Trinidad & Tobago)</option>
                        <option value="+20">🇪🇬 +20 (Egypt)</option>
                        <option value="+212">🇲🇦 +212 (Morocco)</option>
                        <option value="+60">🇲🇾 +60 (Malaysia)</option>
                        <option value="+62">🇮🇩 +62 (Indonesia)</option>
                        <option value="+66">🇹🇭 +66 (Thailand)</option>
                        <option value="+84">🇻🇳 +84 (Vietnam)</option>
                        <option value="+7">🇷🇺 +7 (Russia)</option>
                        <option value="+380">🇺🇦 +380 (Ukraine)</option>
                        <option value="+48">🇵🇱 +48 (Poland)</option>
                    </select>
                    <input type="tel" id="phone" required placeholder="Phone number">
                </div>
            </div>
            
            <div class="form-group">
                <label for="birthday">Birthday *</label>
                <input type="date" id="birthday" required>
                <div class="age-warning" id="ageWarning">⚠️ You must be 18 or older to register.</div>
            </div>
            
            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" required placeholder="Min. 6 characters">
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirm Password *</label>
                <input type="password" id="confirmPassword" required placeholder="Re-enter your password">
            </div>
            
            <button type="submit" class="btn-signup">Create Account</button>
        </form>
        
        <div class="link-signin">
            Already have an account? <a onclick="window.location.href='/signin'">Sign In</a>
        </div>
    </div>
    
    <script src="/static/theme.js"></script>
    <script>
        const form = document.getElementById('signupForm');
        const birthdayInput = document.getElementById('birthday');
        const messageDiv = document.getElementById('message');
        const ageWarning = document.getElementById('ageWarning');
        const submitBtn = document.querySelector('.btn-signup');
        
        // Check age on birthday change
        birthdayInput.addEventListener('change', function() {
            const birthDate = new Date(this.value);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const monthDiff = today.getMonth() - birthDate.getMonth();
            
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            
            if (age < 18) {
                ageWarning.style.display = 'block';
                submitBtn.disabled = true;
            } else {
                ageWarning.style.display = 'none';
                submitBtn.disabled = false;
            }
        });
        
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const country = document.getElementById('country').value;
            const phone = document.getElementById('phone').value;
            const birthday = document.getElementById('birthday').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!country) {
                showMessage('Please select a country code.', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('Passwords do not match!', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters!', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name, email, country, phone, birthday, password, confirm_password: confirmPassword
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('Registration successful! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = '/signin';
                    }, 1500);
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        });
        
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
        }
    </script>
</body>
</html>
